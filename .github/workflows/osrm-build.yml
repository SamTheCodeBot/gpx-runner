name: Build OSRM Docker Image

on:
  push:
    branches:
      - feat/route-suggestions
    paths:
      - 'osrm/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract OSM + Build image
        run: |
          docker build \
            --target extractor \
            --cache-from=ghcr.io/${{ github.repository }}/osrm-sweden-extract:latest \
            -t ghcr.io/${{ github.repository }}/osrm-sweden:latest \
            -t gpxrunner/osrm-sweden:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            osrm/

      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository }}/osrm-sweden:latest