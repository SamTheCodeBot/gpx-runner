name: Build and Push OSRM Sweden Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OSRM image (extracts Sweden OSM, ~15-25 min)
        uses: docker/build-push-action@v5
        with:
          context: ./osrm
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/osrm-sweden:latest
            ghcr.io/${{ github.repository }}/osrm-sweden:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64